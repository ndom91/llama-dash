  #       --mmproj /models/unsloth/gemma4/26B-A4B-it/mmproj-BF16.gguf
  #       -ngl 99
  #       --temp 1.0
  #       --top-p 0.95
  #       --top-k 64
  #       --ctx-size 16384
  #       --reasoning off
  #       --parallel 1
  #       --host 0.0.0.0
  #       --port ${PORT}

