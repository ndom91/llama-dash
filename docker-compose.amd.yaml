services:
  llama-swap:
    image: ghcr.io/mostlygeek/llama-swap:rocm
    command: ['-config', '/config/config.yaml', '-watch-config']
    volumes:
      # Keep the config directory mounted: llama-dash writes config.yaml via atomic rename.
      - ./config:/config
      - ./models:/models
    networks:
      - internal
    restart: unless-stopped
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8080/ || wget -qO- http://localhost:8080/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3

  llama-dash:
    build: .
    ports:
      - '3000:3000'
    env_file:
      # User secrets (BETTER_AUTH_SECRET, CREDENTIAL_ENCRYPTION_KEY, BETTER_AUTH_URL, ...).
      # Required: copy .env.example to .env first or the stack won't start.
      - .env
    environment:
      # Container-topology overrides — must point at the compose network / mounted
      # volume, so they stay here and override any value coming from .env.
      INFERENCE_BASE_URL: http://llama-swap:8080
      INFERENCE_CONFIG_FILE: /config/config.yaml
      DATABASE_PATH: /data/dash.db
    volumes:
      # Keep the config directory mounted: llama-dash writes config.yaml via atomic rename.
      - ./config:/config
      - llama-dash-data:/data
    networks:
      - internal
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    depends_on:
      llama-swap:
        condition: service_healthy

volumes:
  llama-dash-data:

networks:
  internal:
