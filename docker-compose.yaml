services:
  llama-swap:
    image: ghcr.io/mostlygeek/llama-swap:rocm
    # For NVIDIA: ghcr.io/mostlygeek/llama-swap:cuda
    # For CPU:    ghcr.io/mostlygeek/llama-swap:cpu
    command: ["-config", "/config/config.yaml", "-watch-config"]
    volumes:
      - ./config:/config
      - ./models:/models
    networks:
      - internal
    # AMD GPU passthrough
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    # For NVIDIA, replace 'devices' above with:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 3

  llama-dash:
    build: .
    ports:
      - "3000:3000"
    environment:
      LLAMASWAP_URL: http://llama-swap:8080
      LLAMASWAP_CONFIG_FILE: /config/config.yaml
      DATABASE_PATH: /data/dash.db
      # LLAMASWAP_INSECURE: "false"
    volumes:
      - ./config:/config
      - llama-dash-data:/data
    networks:
      - internal
    depends_on:
      llama-swap:
        condition: service_healthy

volumes:
  llama-dash-data:

networks:
  internal:
